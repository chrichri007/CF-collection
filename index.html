<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfume Essential</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
background:#0b0b0b;
}

header{
text-align:center;
padding:40px;
font-size:34px;
font-weight:bold;
}

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
padding:20px;
}

input,select{
padding:10px;
border-radius:8px;
border:none;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
border-radius:12px;
border:1px solid #333;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:contain;
background:black;
}

.content{
padding:15px;
}

.name{
font-size:18px;
font-weight:bold;
}

.specs{
color:#aaa;
font-size:14px;
margin-top:4px;
}

.price{
color:#ffd700;
font-weight:bold;
margin:10px 0;
font-size:20px;
}

button{
background:#ffd700;
border:none;
padding:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<header>Perfume Essential</header>

<div class="controls">

<input id="search" placeholder="Buscar perfume">

<select id="brand">
<option value="">Todas las marcas</option>
</select>

</div>

<div class="grid" id="catalog"></div>

<a class="whatsapp" href="https://wa.me/19563371082" target="_blank">
WhatsApp
</a>

<script>

const perfumes = [

{
name:"Nautica Voyage",
brand:"Nautica",
type:"EDT",
size:"100ml",
price:339,
img:"https://cdn.fragrancenet.com/images/photos/900x900/181557.jpg"
},

{
name:"Versace Eros",
brand:"Versace",
type:"EDP",
size:"100ml",
price:1499,
img:"https://cdn.fragrancenet.com/images/photos/900x900/256701.jpg"
},

{
name:"Invictus",
brand:"Paco Rabanne",
type:"EDT",
size:"100ml",
price:1699,
img:"https://cdn.fragrancenet.com/images/photos/900x900/259520.jpg"
},

{
name:"Acqua Di Gio",
brand:"Armani",
type:"EDT",
size:"100ml",
price:1899,
img:"https://cdn.fragrancenet.com/images/photos/900x900/126742.jpg"
},

{
name:"Montblanc Explorer",
brand:"Montblanc",
type:"EDP",
size:"100ml",
price:999,
img:"https://cdn.fragrancenet.com/images/photos/900x900/349436.jpg"
}

]

const catalog = document.getElementById("catalog")

function render(list){

catalog.innerHTML=""

list.forEach(p=>{

catalog.innerHTML += `

<div class="card">

<img src="${p.img}">

<div class="content">

<div class="name">${p.name}</div>

<div class="specs">

Marca: ${p.brand}<br>
Tipo: ${p.type}<br>
Tamaño: ${p.size}

</div>

<div class="price">$${p.price} MXN</div>

<button onclick="window.open('https://wa.me/19563371082?text=Hola quiero ${p.name}')">
Comprar
</button>

</div>

</div>

`

})

}

render(perfumes)

const brandSelect = document.getElementById("brand")

const brands = [...new Set(perfumes.map(p=>p.brand))]

brands.forEach(b=>{
brandSelect.innerHTML += <option value="${b}">${b}</option>
})

document.getElementById("search").addEventListener("input",filter)

brandSelect.addEventListener("change",filter)

function filter(){

let result = perfumes

const text = document.getElementById("search").value.toLowerCase()
const brand = brandSelect.value

if(text){
result = result.filter(p=>p.name.toLowerCase().includes(text))
}

if(brand){
result = result.filter(p=>p.brand===brand)
}

render(result)

}

</script>

</body>
</html>
