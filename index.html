<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Perfume Essential</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;

/* fondo marmol */

background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.06), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,0.05), transparent 40%),
linear-gradient(135deg,#0b0b0b,#1a1a1a,#0f0f0f);
}

header{
text-align:center;
padding:40px;
font-size:34px;
font-weight:bold;
letter-spacing:2px;
}

/* logos */

.brands{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:20px;
opacity:0.8;
}

.brands img{
height:35px;
}

/* controles */

.controls{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
padding:20px;
}

input,select{
padding:10px;
border-radius:8px;
border:none;
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
border-radius:12px;
border:1px solid #333;
overflow:hidden;
}

.card img{
width:100%;
height:220px;
object-fit:contain;
background:black;
}

.content{
padding:15px;
}

.name{
font-size:18px;
font-weight:bold;
}

.specs{
color:#aaa;
font-size:14px;
margin-top:4px;
}

.price{
color:#ffd700;
font-weight:bold;
margin:10px 0;
font-size:20px;
}

button{
background:#ffd700;
border:none;
padding:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
}

button:hover{
opacity:0.9;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
font-weight:bold;
text-decoration:none;
}

</style>

</head>

<body>

<header>Perfume Essential</header>

<div class="brands">

<img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Versace_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/24/Armani_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/3/35/Dior_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/9d/Hugo_Boss_logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/69/Paco_Rabanne_logo.svg">

</div>

<div class="controls">

<input id="search" placeholder="Buscar perfume">

<select id="brandFilter">
<option value="">Todas las marcas</option>
</select>

<select id="sort">
<option value="">Ordenar</option>
<option value="low">Precio menor</option>
<option value="high">Precio mayor</option>
</select>

</div>

<div class="grid" id="catalog"></div>

<a class="whatsapp" target="_blank"
href="https://wa.me/19563371082">
WhatsApp
</a>

<script>

const phone="19563371082"

function precio(base){

if(base<500) return Math.round(base*1.40)
if(base<1000) return Math.round(base*1.30)
if(base<2000) return Math.round(base*1.20)

return Math.round(base*1.15)

}

const basePerfumes=[

{name:"Nautica Voyage",brand:"Nautica",type:"EDT",size:"100ml",base:242,img:"https://m.media-amazon.com/images/I/71m4iJqJY6L.jpg"},

{name:"Versace Eros",brand:"Versace",type:"EDP",size:"100ml",base:1054,img:"https://m.media-amazon.com/images/I/61K8ouYrHeL.jpg"},

{name:"Versace Dylan Blue",brand:"Versace",type:"EDT",size:"100ml",base:887,img:"https://m.media-amazon.com/images/I/61mH0U9sFCL.jpg"},

{name:"Invictus",brand:"Paco Rabanne",type:"EDT",size:"100ml",base:1388,img:"https://m.media-amazon.com/images/I/71dZqv1A0GL.jpg"},

{name:"Acqua Di Gio",brand:"Armani",type:"EDT",size:"100ml",base:1590,img:"https://m.media-amazon.com/images/I/61g8QvQ8SQL.jpg"},

{name:"Montblanc Explorer",brand:"Montblanc",type:"EDP",size:"100ml",base:790,img:"https://m.media-amazon.com/images/I/61dJ5pHfWnL.jpg"},

{name:"Afnan 9PM",brand:"Afnan",type:"EDP",size:"100ml",base:525,img:"https://m.media-amazon.com/images/I/61v+4Wc9fAL.jpg"},

{name:"Lattafa Asad",brand:"Lattafa",type:"EDP",size:"100ml",base:479,img:"https://m.media-amazon.com/images/I/61QF9W6N6HL.jpg"},

{name:"Bharara King",brand:"Bharara",type:"EDP",size:"100ml",base:1060,img:"https://m.media-amazon.com/images/I/61Z2pVwJbJL.jpg"},

{name:"Le Male",brand:"Jean Paul Gaultier",type:"EDT",size:"125ml",base:1500,img:"https://m.media-amazon.com/images/I/71xV8Kf8WGL.jpg"}

]

const perfumes=[]

for(let i=0;i<30;i++){
basePerfumes.forEach(p=>{
perfumes.push({...p})
})
}

const catalog=document.getElementById("catalog")

function render(list){

catalog.innerHTML=""

list.forEach(p=>{

const sell=precio(p.base)

catalog.innerHTML+=`

<div class="card">

<img src="${p.img}">

<div class="content">

<div class="name">${p.name}</div>

<div class="specs">

Marca: ${p.brand}<br>
Tipo: ${p.type}<br>
Tamaño: ${p.size}

</div>

<div class="price">$${sell} MXN</div>

<button onclick="window.open('https://wa.me/${phone}?text=Hola quiero ${p.name}')">

Comprar

</button>

</div>

</div>

`

})

}

render(perfumes)

const brands=[...new Set(perfumes.map(p=>p.brand))]

const brandFilter=document.getElementById("brandFilter")

brands.forEach(b=>{

brandFilter.innerHTML+=<option>${b}</option>

})

function update(){

let list=[...perfumes]

const search=document.getElementById("search").value.toLowerCase()
const brand=brandFilter.value
const sort=document.getElementById("sort").value

if(search){

list=list.filter(p=>p.name.toLowerCase().includes(search))

}

if(brand){

list=list.filter(p=>p.brand===brand)

}

if(sort==="low"){

list.sort((a,b)=>precio(a.base)-precio(b.base))

}

if(sort==="high"){

list.sort((a,b)=>precio(b.base)-precio(a.base))

}

render(list)

}

document.getElementById("search").addEventListener("input",update)
brandFilter.addEventListener("change",update)
document.getElementById("sort").addEventListener("change",update)

</script>

</body>
</html>
