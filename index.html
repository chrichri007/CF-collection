<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07070c" />
  <title>Perfume Essential | Catálogo</title>

  <style>
    :root{
      --bg:#07070c;
      --panel:rgba(0,0,0,.22);
      --text:#f2f4ff;
      --muted:#a9acc0;
      --line:rgba(255,255,255,.10);
      --line2:rgba(255,255,255,.18);
      --gold1:#ffd37a;
      --gold2:#b8872b;
      --shadow:0 18px 70px rgba(0,0,0,.60);
      --r:18px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--text);
      background:
        radial-gradient(1000px 420px at 12% 0%, rgba(255,211,122,.18), transparent 60%),
        radial-gradient(900px 380px at 88% 10%, rgba(77,225,255,.10), transparent 60%),
        linear-gradient(180deg,#05050a,var(--bg));
      min-height:100vh;
    }
    a{color:inherit;text-decoration:none}

    .lux-wrap{max-width:1120px;margin:0 auto;padding:16px}
    .lux-bg{
      border-radius:22px;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      overflow:hidden;
      background:var(--panel);
      backdrop-filter:blur(10px);
    }

    /* HERO */
    .lux-hero{padding:20px 16px 12px;border-bottom:1px solid var(--line)}
    .lux-top{display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .lux-brand{display:flex;gap:10px;align-items:center}
    .lux-dot{
      width:12px;height:12px;border-radius:999px;
      background:linear-gradient(90deg,var(--gold1),var(--gold2));
      box-shadow:0 0 26px rgba(255,211,122,.35);
      flex:0 0 auto;
    }
    .lux-title{margin:0;font-size:clamp(22px,3vw,34px);letter-spacing:.3px}
    .lux-sub{margin:6px 0 0;color:var(--muted);font-size:14px}

    .lux-actions{display:flex;gap:10px;flex-wrap:wrap}
    .lux-btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:12px 14px;border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);font-weight:900;
      transition:.2s transform ease,.2s filter ease,.2s border-color ease;
      min-height:44px;
      white-space:nowrap;
    }
    .lux-btn:hover{transform:translateY(-1px);filter:brightness(1.06);border-color:var(--line2)}
    .lux-btn.gold{
      border:0;color:#0a0a0f;
      background:linear-gradient(90deg,var(--gold1),var(--gold2));
      box-shadow:0 14px 40px rgba(255,211,122,.18);
    }

    .lux-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .lux-badge{
      font-size:12px;padding:7px 10px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      white-space:nowrap;
    }

    /* Chips (scroll en móvil) */
    .lux-nav{
      display:flex;gap:8px;flex-wrap:nowrap;
      overflow-x:auto;
      -webkit-overflow-scrolling:touch;
      padding:10px 0 2px;
      margin-top:12px;
      scrollbar-width:none;
    }
    .lux-nav::-webkit-scrollbar{display:none}
    .lux-chip{
      font-size:13px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.25);
      color:var(--text);
      transition:.2s border-color ease,.2s transform ease;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .lux-chip:hover{border-color:var(--line2);transform:translateY(-1px)}

    /* Sticky barra de búsqueda */
    .lux-sticky{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(7,7,12,.65);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
      padding:10px 16px;
    }
    .lux-sticky-inner{
      max-width:1120px;
      margin:0 auto;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .lux-input{
      width:100%;
      min-width:220px;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      outline:none;
      flex:1 1 240px;
    }
    .lux-input::placeholder{color:rgba(169,172,192,.85)}
    .lux-pill{
      display:inline-flex;align-items:center;justify-content:center;
      padding:10px 12px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.25);
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    /* Body + secciones */
    .lux-body{padding:16px}
    .lux-h2{
      margin:18px 0 12px;
      font-size:18px;
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .lux-note{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.35}

    /* Grid */
    .lux-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    @media (max-width: 980px){ .lux-grid{grid-template-columns:repeat(2,1fr)} }
    @media (max-width: 680px){ .lux-grid{grid-template-columns:1fr} }

    .lux-card{
      border:1px solid var(--line);
      border-radius:var(--r);
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      overflow:hidden;
      box-shadow:0 14px 50px rgba(0,0,0,.35);
    }
    /* placeholder superior */
    .lux-img{
      height:62px;
      border-bottom:1px solid var(--line);
      background:
        radial-gradient(520px 180px at 20% 10%, rgba(255,211,122,.22), transparent 55%),
        radial-gradient(520px 180px at 80% 20%, rgba(77,225,255,.10), transparent 60%),
        linear-gradient(135deg, rgba(255,255,255,.02), rgba(255,255,255,.00));
    }
    .lux-content{padding:12px 12px 14px}
    .lux-name{margin:0 0 6px;font-weight:950;letter-spacing:.2px}
    .lux-meta{margin:0;color:var(--muted);font-size:13px;line-height:1.35}
    .lux-tags{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 0}
    .lux-tag{
      font-size:12px;
      padding:6px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.22);
      color:rgba(255,255,255,.92);
      white-space:nowrap;
    }
    .lux-price{
      margin:10px 0 10px;
      font-weight:950;
      background:linear-gradient(90deg,var(--gold1),var(--gold2));
      -webkit-background-clip:text;
      color:transparent;
      font-size:16px;
    }
    .lux-row{display:flex;gap:10px;flex-wrap:wrap}
    .lux-mini{
      padding:11px 12px;border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      font-weight:900;font-size:13px;
      min-height:44px;
      display:inline-flex;align-items:center;justify-content:center;
      flex:1 1 auto;
    }
    .lux-mini.gold{
      border:0;background:linear-gradient(90deg,var(--gold1),var(--gold2));
      color:#0a0a0f;
    }
    .lux-mini.ghost{
      color:var(--text);
      background:rgba(0,0,0,.20);
    }

    /* Caja info */
    .lux-info{
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.03);
      padding:14px;
    }
    .lux-small{margin:0;color:var(--muted);font-size:13px;line-height:1.45}

    /* WhatsApp flotante */
    .lux-wa-float{
      position:fixed;
      right:14px;
      bottom:14px;
      z-index:9999;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(90deg,var(--gold1),var(--gold2));
      color:#0a0a0f;
      font-weight:950;
      box-shadow:0 18px 60px rgba(0,0,0,.55);
      min-height:44px;
    }
    .lux-wa-float span{display:inline}

    /* === OPTIMIZACIÓN CELULAR (como tu screenshot) === */
    @media (max-width: 520px){
      .lux-wrap{padding:10px}
      .lux-hero{padding:14px 12px 10px}
      .lux-title{font-size:24px}
      .lux-sub{font-size:12.5px;margin-top:4px}

      .lux-actions{width:100%;gap:8px}
      .lux-btn{flex:1 1 auto;padding:12px 12px}

      .lux-badge{font-size:11px;padding:6px 9px}

      .lux-sticky{padding:10px 12px}
      .lux-input{min-width:160px}

      /* 2 columnas en móvil */
      .lux-grid{
        grid-template-columns:repeat(2, minmax(0,1fr)) !important;
        gap:10px;
      }

      .lux-img{height:54px}
      .lux-content{padding:10px 10px 12px}
      .lux-name{font-size:13.5px}
      .lux-meta{font-size:11.5px;line-height:1.25}
      .lux-tag{font-size:11px;padding:5px 7px}
      .lux-price{font-size:13.5px;margin:8px 0 8px}
      .lux-mini{min-height:40px;padding:10px 10px;border-radius:12px;font-size:12.5px}

      .lux-wa-float{right:12px;bottom:12px;padding:12px 12px}
    }
    @media (max-width: 360px){
      .lux-grid{grid-template-columns:1fr !important}
      .lux-wa-float span{display:none}
    }
  </style>
</head>

<body>
  <!-- WhatsApp flotante -->
  <a class="lux-wa-float"
     href="https://wa.me/19563371082?text=Hola%20quiero%20informaci%C3%B3n%20de%20disponibilidad%2C%20pago%20y%20entrega"
     target="_blank" rel="noopener">📲 <span>WhatsApp</span></a>

  <div class="lux-wrap">
    <div class="lux-bg">

      <!-- HERO -->
      <div class="lux-hero">
        <div class="lux-top">
          <div>
            <div class="lux-brand">
              <span class="lux-dot"></span>
              <h1 class="lux-title">Perfume Essential</h1>
            </div>
            <p class="lux-sub">Boutique • Catálogo premium • Pide por WhatsApp en 1 minuto</p>
          </div>

          <div class="lux-actions">
            <a class="lux-btn gold" target="_blank" rel="noopener"
               href="https://wa.me/19563371082?text=Hola%20quiero%20informaci%C3%B3n%20de%20disponibilidad%2C%20pago%20y%20entrega">
              📲 Pedir por WhatsApp
            </a>
            <a class="lux-btn" href="#como-comprar">🛒 Cómo comprar</a>
          </div>
        </div>

        <div class="lux-badges">
          <span class="lux-badge">✅ Perfumes originales</span>
          <span class="lux-badge">📦 Envíos a México</span>
          <span class="lux-badge">💳 Pago seguro</span>
          <span class="lux-badge">🧾 Pregunta por disponibilidad</span>
        </div>

        <div class="lux-nav">
          <a class="lux-chip" href="#mas-vendidos">🔥 Más vendidos</a>
          <a class="lux-chip" href="#disenador">🕴️ Diseñador</a>
          <a class="lux-chip" href="#arabes">🌙 Árabes</a>
          <a class="lux-chip" href="#nicho">👑 Nicho</a>
          <a class="lux-chip" href="#dama">💖 Dama</a>
        </div>
      </div>

      <!-- Sticky búsqueda -->
      <div class="lux-sticky">
        <div class="lux-sticky-inner">
          <input id="q" class="lux-input" placeholder="Buscar (ej: sauvage, lattafa, 100ml, noche)" />
          <span class="lux-pill" id="count">Cargando…</span>
        </div>
      </div>

      <!-- Catálogo -->
      <div class="lux-body" id="catalog"></div>

    </div>
  </div>

  <script>
    // ✅ WhatsApp (formato wa.me sin + ni paréntesis)
    const PHONE = "19563371082";

    // Datos: secciones + perfumes
    const SECTIONS = [
      {
        id:"mas-vendidos",
        title:"🔥 Más vendidos",
        note:"¿No ves el perfume que buscas? Mándame WhatsApp y te confirmo disponibilidad y entrega.",
        items:[
          {name:"Dior Sauvage EDP", ml:"100 ml", meta:"Versátil • Diario / Noche", tags:["🌿 Fresco","🧴 Limpio","🌙 Noche"], priceMXN:3200, priceUSD:156},
          {name:"Acqua Di Gio Parfum", ml:"125 ml", meta:"Elegante • Oficina", tags:["🌊 Acuático","🕴️ Formal","☀️ Diario"], priceMXN:2900, priceUSD:141},
          {name:"Azzaro The Most Wanted Parfum", ml:"100 ml", meta:"Intenso • Noche / Fiesta", tags:["🔥 Dulce","🌙 Noche","🥂 Fiesta"], priceMXN:2600, priceUSD:127},
          {name:"YSL Y EDP", ml:"100 ml", meta:"Limpio • Oficina / Diario", tags:["🧼 Limpio","🕴️ Formal","☀️ Diario"], priceMXN:2600, priceUSD:127},
          {name:"Bleu de Chanel EDP", ml:"100 ml", meta:"Premium • Versátil", tags:["🧼 Limpio","🧭 Versátil","🕴️ Formal"], priceMXN:3300, priceUSD:160},
          {name:"Invictus EDT", ml:"100 ml", meta:"Deportivo • Diario", tags:["🏆 Deportivo","☀️ Diario","🌊 Fresco"], priceMXN:1700, priceUSD:83},
        ]
      },
      {
        id:"disenador",
        title:"🕴️ Diseñador",
        note:"Diseñador: versátiles y fáciles de vender.",
        items:[
          {name:"JPG Le Male Elixir", ml:"125 ml", meta:"Dulce/Avainillado • Noche", tags:["🍯 Dulce","🌙 Noche","🧥 Frío"], priceMXN:3100, priceUSD:151},
          {name:"Valentino Uomo Born in Roma", ml:"100 ml", meta:"Moderno • Diario/Noche", tags:["🧭 Versátil","🌙 Noche","🍃 Fresco"], priceMXN:2400, priceUSD:117},
          {name:"Spicebomb Extreme", ml:"90 ml", meta:"Especiado • Frío/Noche", tags:["🧥 Frío","🌙 Noche","🔥 Intenso"], priceMXN:2400, priceUSD:117},
          {name:"Versace Eros EDP", ml:"100 ml", meta:"Fiesta • Noche", tags:["🍬 Dulce","🌙 Noche","🥂 Fiesta"], priceMXN:1800, priceUSD:88},
          {name:"Prada Luna Rossa Carbon", ml:"100 ml", meta:"Limpio • Diario", tags:["🧼 Limpio","☀️ Diario","🧭 Versátil"], priceMXN:2600, priceUSD:127},
          {name:"D&G The One EDP", ml:"100 ml", meta:"Citas • Noche", tags:["😎 Sexy","🌙 Noche","🧥 Frío"], priceMXN:2400, priceUSD:117},
        ]
      },
      {
        id:"arabes",
        title:"🌙 Árabes",
        note:"Árabes: mucha proyección y buen precio.",
        items:[
          {name:"Afnan 9PM", ml:"100 ml", meta:"Dulce • Noche", tags:["🍬 Dulce","🌙 Noche","🥂 Fiesta"], priceMXN:850, priceUSD:41},
          {name:"Lattafa Khamrah", ml:"100 ml", meta:"Gourmand • Frío", tags:["🍯 Dulce","🧥 Frío","🌙 Noche"], priceMXN:925, priceUSD:45},
          {name:"Armaf Odyssey Mandarin Sky", ml:"200 ml", meta:"Dulce • Diario", tags:["🍊 Cítrico","☀️ Diario","🍬 Dulce"], priceMXN:1300, priceUSD:64},
          {name:"Lattafa Asad", ml:"100 ml", meta:"Especiado • Noche", tags:["🔥 Intenso","🌙 Noche","💸 Best"], priceMXN:650, priceUSD:32},
          {name:"Armaf CDN Intense Man", ml:"105 ml", meta:"Ahumado • Noche", tags:["🌙 Noche","🔥 Proyección","🧭 Versátil"], priceMXN:950, priceUSD:46},
          {name:"Rasasi Hawas", ml:"100 ml", meta:"Acuático • Verano", tags:["🌊 Acuático","☀️ Diario","🔥 Proyección"], priceMXN:1100, priceUSD:54},
        ]
      },
      {
        id:"nicho",
        title:"👑 Nicho",
        note:"Nicho: aroma más exclusivo (pregunta por disponibilidad).",
        items:[
          {name:"Xerjoff Erba Pura", ml:"100 ml", meta:"Frutal • Premium", tags:["🍍 Frutal","👑 Premium","🔥 Proyección"], priceMXN:4500, priceUSD:220},
          {name:"Parfums de Marly Layton", ml:"125 ml", meta:"Dulce especiado", tags:["🍯 Dulce","🧥 Frío","👑 Premium"], priceMXN:5200, priceUSD:255},
          {name:"Creed Aventus", ml:"100 ml", meta:"Clásico • Premium", tags:["🍍 Frutal","🧭 Versátil","👑 Premium"], priceMXN:6500, priceUSD:320},
          {name:"Mancera Cedrat Boise", ml:"120 ml", meta:"Cítrico amaderado", tags:["🍋 Cítrico","🧭 Versátil","🔥 Proyección"], priceMXN:2800, priceUSD:137},
          {name:"Initio Side Effect", ml:"90 ml", meta:"Ambarado • Noche", tags:["🌙 Noche","🔥 Intenso","👑 Premium"], priceMXN:6200, priceUSD:305},
          {name:"Nishane Hacivat", ml:"100 ml", meta:"Fresco premium", tags:["🌿 Fresco","🔥 Proyección","👑 Premium"], priceMXN:5800, priceUSD:285},
        ]
      },
      {
        id:"dama",
        title:"💖 Dama",
        note:"Dama: opciones que siempre se mueven bien.",
        items:[
          {name:"YSL Libre EDP", ml:"90 ml", meta:"Elegante • Diario", tags:["🕴️ Elegante","☀️ Diario","🌸 Floral"], priceMXN:3200, priceUSD:156},
          {name:"Good Girl EDP", ml:"80 ml", meta:"Noche • Sexy", tags:["😎 Sexy","🌙 Noche","🍯 Dulce"], priceMXN:3200, priceUSD:156},
          {name:"Black Opium EDP", ml:"90 ml", meta:"Café • Noche", tags:["☕ Café","🌙 Noche","🍬 Dulce"], priceMXN:3100, priceUSD:151},
          {name:"La Vie Est Belle", ml:"100 ml", meta:"Dulce • Diario", tags:["🍬 Dulce","☀️ Diario","🌸 Floral"], priceMXN:2900, priceUSD:141},
          {name:"Versace Bright Crystal", ml:"90 ml", meta:"Fresco • Diario", tags:["🧼 Limpio","☀️ Diario","🌸 Floral"], priceMXN:2200, priceUSD:107},
          {name:"Lattafa Yara", ml:"100 ml", meta:"Dulce • Diario", tags:["🍓 Dulce","☀️ Diario","💸 Best"], priceMXN:700, priceUSD:34},
        ]
      },
    ];

    // Utilidades
    function esc(s){
      return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }
    function waLink(text){
      return https://wa.me/${PHONE}?text=${encodeURIComponent(text)};
    }

    // Render
    const catalogEl = document.getElementById("catalog");
    const qEl = document.getElementById("q");
    const countEl = document.getElementById("count");

    function cardHTML(p){
      const msg = Hola quiero ${p.name} ${p.ml} (${p.priceMXN} MXN). ¿Hay disponibilidad?;
      return `
        <div class="lux-card">
          <div class="lux-img"></div>
          <div class="lux-content">
            <p class="lux-name">${esc(p.name)}</p>
            <p class="lux-meta">${esc(p.ml)} • ${esc(p.meta)}</p>
            <div class="lux-tags">${(p.tags||[]).map(t=><span class="lux-tag">${esc(t)}</span>).join("")}</div>
            <div class="lux-price">$${Number(p.priceMXN).toLocaleString("es-MX")} MXN • $${Number(p.priceUSD).toLocaleString("en-US")} USD</div>
            <div class="lux-row">
              <a class="lux-mini gold" target="_blank" rel="noopener" href="${waLink(msg)}">Pedir</a>
              <a class="lux-mini ghost" target="_blank" rel="noopener"
                 href="https://wa.me/${PHONE}?text=Hola%20%C2%BFMe%20confirmas%20disponibilidad%20y%20entrega%3F">Disponibilidad</a>
            </div>
          </div>
        </div>
      `;
    }

    function render(){
      const q = (qEl.value || "").trim().toLowerCase();
      let total = 0;

      const html = SECTIONS.map(sec=>{
        let items = sec.items;

        if(q){
          items = items.filter(p=>{
            const blob = ${sec.title} ${p.name} ${p.ml} ${p.meta} ${(p.tags||[]).join(" ")} ${p.priceMXN} ${p.priceUSD}.toLowerCase();
            return blob.includes(q);
          });
        }

        if(items.length === 0) return "";

        total += items.length;

        return `
          <section id="${esc(sec.id)}">
            <h2 class="lux-h2">
              <span>${esc(sec.title)}</span>
              <span class="lux-pill">${items.length} productos</span>
            </h2>
            <div class="lux-grid">
              ${items.map(cardHTML).join("")}
            </div>
            ${sec.note ? <p class="lux-note">${esc(sec.note)}</p> : ``}
          </section>
        `;
      }).join("");

      catalogEl.innerHTML = html + `
        <section id="como-comprar" style="margin-top:16px">
          <h2 class="lux-h2">🛒 Cómo comprar</h2>
          <div class="lux-info">
            <p class="lux-small">
              <b>1)</b> Elige tu perfume → <b>2)</b> “Pedir” → <b>3)</b> Te confirmo disponibilidad, pago y entrega por WhatsApp.<br>
              <b>WhatsApp:</b> +1 (956) 337-1082
            </p>
          </div>
        </section>
      `;

      countEl.textContent = ${total} perfumes;
    }

    // Arranque seguro
    window.addEventListener("DOMContentLoaded", ()=>{
      render();
      qEl.addEventListener("input", render);
    });
  </script>
</body>
</html>
