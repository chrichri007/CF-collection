<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfume Essential</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:40px;
font-size:34px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
border-radius:12px;
border:1px solid #333;
padding:15px;
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
background:black;
}

.name{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

.specs{
color:#aaa;
font-size:14px;
margin-top:5px;
}

.price{
color:#ffd700;
font-weight:bold;
font-size:20px;
margin:10px 0;
}

button{
background:#ffd700;
border:none;
padding:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
font-weight:bold;
text-decoration:none;
}

</style>

</head>

<body>

<header>Perfume Essential</header>

<div class="grid" id="catalog"></div>

<a class="whatsapp"
href="https://wa.me/19563371082"
target="_blank">
WhatsApp
</a>

<script>

const perfumes=[

{name:"Nautica Voyage",brand:"Nautica",type:"EDT",size:"100ml",price:339,img:"https://cdn.fragrancenet.com/images/photos/900x900/181557.jpg"},

{name:"Versace Eros",brand:"Versace",type:"EDP",size:"100ml",price:1499,img:"https://cdn.fragrancenet.com/images/photos/900x900/256701.jpg"},

{name:"Invictus",brand:"Paco Rabanne",type:"EDT",size:"100ml",price:1699,img:"https://cdn.fragrancenet.com/images/photos/900x900/259520.jpg"},

{name:"Acqua Di Gio",brand:"Armani",type:"EDT",size:"100ml",price:1899,img:"https://cdn.fragrancenet.com/images/photos/900x900/126742.jpg"},

{name:"Montblanc Explorer",brand:"Montblanc",type:"EDP",size:"100ml",price:999,img:"https://cdn.fragrancenet.com/images/photos/900x900/349436.jpg"},

{name:"Afnan 9PM",brand:"Afnan",type:"EDP",size:"100ml",price:699,img:"https://cdn.fragrancenet.com/images/photos/900x900/431077.jpg"},

{name:"Lattafa Asad",brand:"Lattafa",type:"EDP",size:"100ml",price:599,img:"https://cdn.fragrancenet.com/images/photos/900x900/456218.jpg"},

{name:"Bharara King",brand:"Bharara",type:"EDP",size:"100ml",price:1399,img:"https://cdn.fragrancenet.com/images/photos/900x900/455541.jpg"},

{name:"Jean Paul Gaultier Le Male",brand:"Jean Paul Gaultier",type:"EDT",size:"125ml",price:1899,img:"https://cdn.fragrancenet.com/images/photos/900x900/124176.jpg"},

{name:"Boss Bottled",brand:"Hugo Boss",type:"EDT",size:"100ml",price:999,img:"https://cdn.fragrancenet.com/images/photos/900x900/132889.jpg"},

{name:"Hawas for Him",brand:"Rasasi",type:"EDP",size:"100ml",price:899,img:"https://cdn.fragrancenet.com/images/photos/900x900/355937.jpg"},

{name:"Dolce & Gabbana K",brand:"Dolce & Gabbana",type:"EDP",size:"100ml",price:1499,img:"https://cdn.fragrancenet.com/images/photos/900x900/328061.jpg"}

]

// duplicar para catálogo grande

while(perfumes.length<80){
perfumes.push(perfumes[Math.floor(Math.random()*perfumes.length)])
}

const catalog=document.getElementById("catalog")

perfumes.forEach(p=>{

catalog.innerHTML+=`

<div class="card">

<img src="${p.img}">

<div class="name">${p.name}</div>

<div class="specs">

Marca: ${p.brand}<br>
Tipo: ${p.type}<br>
Tamaño: ${p.size}

</div>

<div class="price">$${p.price} MXN</div>

<button onclick="window.open('https://wa.me/19563371082?text=Hola quiero ${p.name}')">

Comprar

</button>

</div>

`

})

</script>

</body>
</html>
