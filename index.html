  <style>
    :root{
      --bg:#07070c;
      --panel: rgba(0,0,0,.22);
      --card: rgba(255,255,255,.05);
      --text:#f2f4ff;
      --muted:#a9acc0;
      --line:rgba(255,255,255,.10);
      --line2:rgba(255,255,255,.18);
      --gold1:#ffd37a;
      --gold2:#b8872b;
      --shadow: 0 18px 70px rgba(0,0,0,.60);
      --r:18px;
      --r2:14px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--text);
      background:
        radial-gradient(1000px 420px at 12% 0%, rgba(255,211,122,.18), transparent 60%),
        radial-gradient(900px 380px at 88% 10%, rgba(77,225,255,.10), transparent 60%),
        linear-gradient(180deg, #05050a, var(--bg));
      min-height:100vh;
    }
    a{color:inherit;text-decoration:none}
    b{color:#fff}
    .lux-wrap{max-width:1120px;margin:0 auto;padding:16px}
    .lux-bg{
      border-radius:22px;
      border:1px solid var(--line);
      box-shadow: var(--shadow);
      overflow:hidden;
      background: var(--panel);
      backdrop-filter: blur(10px);
    }

    /* HERO */
    .lux-hero{padding:20px 16px 12px;border-bottom:1px solid var(--line)}
    .lux-top{display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .lux-brand{display:flex;gap:10px;align-items:center}
    .lux-dot{
      width:12px;height:12px;border-radius:999px;
      background:linear-gradient(90deg,var(--gold1),var(--gold2));
      box-shadow:0 0 26px rgba(255,211,122,.35);
      flex:0 0 auto;
    }
    .lux-title{margin:0;font-size:clamp(24px, 3vw, 34px);letter-spacing:.3px}
    .lux-sub{margin:6px 0 0;color:var(--muted);font-size:14px}

    .lux-actions{display:flex;gap:10px;flex-wrap:wrap}
    .lux-btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:12px 14px;border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);font-weight:900;
      transition:.2s transform ease,.2s filter ease,.2s border-color ease;
      min-height:44px;
      white-space:nowrap;
    }
    .lux-btn:hover{transform:translateY(-1px);filter:brightness(1.06);border-color:var(--line2)}
    .lux-btn.gold{
      border:0;color:#0a0a0f;
      background:linear-gradient(90deg,var(--gold1),var(--gold2));
      box-shadow:0 14px 40px rgba(255,211,122,.18);
    }

    .lux-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .lux-badge{
      font-size:12px;padding:7px 10px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      white-space:nowrap;
    }

    /* NAV (sticky) */
    .lux-nav{
      display:flex;gap:8px;flex-wrap:nowrap;
      overflow:auto;
      padding:10px 0 2px;
      margin-top:12px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width:none;
    }
    .lux-nav::-webkit-scrollbar{display:none}
    .lux-chip{
      font-size:13px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.25);
      color:var(--text);
      transition:.2s border-color ease,.2s transform ease;
      white-space:nowrap;
      flex:0 0 auto;
    }
    .lux-chip:hover{border-color:var(--line2);transform:translateY(-1px)}
    .lux-sticky{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(7,7,12,.65);
      backdrop-filter: blur(10px);
      border-bottom:1px solid var(--line);
      padding:10px 16px;
    }
    .lux-sticky-inner{
      max-width:1120px;
      margin:0 auto;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .lux-search{
      flex:1 1 240px;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .lux-input{
      width:100%;
      min-width:160px;
      padding:12px 12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);
      outline:none;
    }
    .lux-input::placeholder{color:rgba(169,172,192,.85)}
    .lux-pill{
      display:inline-flex;align-items:center;justify-content:center;
      padding:10px 12px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.25);
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .lux-body{padding:16px}
    .lux-h2{
      margin:18px 0 12px;
      font-size:18px;
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .lux-note{margin:8px 0 0;color:var(--muted);font-size:13px;line-height:1.35}

    /* GRID responsive */
    .lux-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    @media (max-width: 980px){ .lux-grid{grid-template-columns:repeat(2,1fr)} }
    @media (max-width: 680px){ .lux-grid{grid-template-columns:1fr} }

    .lux-card{
      border:1px solid var(--line);
      border-radius:var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      overflow:hidden;
      box-shadow: 0 14px 50px rgba(0,0,0,.35);
    }

    /* Placeholder elegante (sin imágenes) */
    .lux-img{
      height:58px;
      border-bottom:1px solid var(--line);
      background:
        radial-gradient(520px 180px at 20% 10%, rgba(255,211,122,.22), transparent 55%),
        radial-gradient(520px 180px at 80% 20%, rgba(77,225,255,.10), transparent 60%),
        linear-gradient(135deg, rgba(255,255,255,.02), rgba(255,255,255,.00));
    }

    .lux-content{padding:12px 12px 14px}
    .lux-name{margin:0 0 6px;font-weight:950;letter-spacing:.2px}
    .lux-meta{margin:0;color:var(--muted);font-size:13px;line-height:1.35}
    .lux-spec{
      margin:10px 0 0;
      padding:10px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.20);
      color:rgba(255,255,255,.90);
      font-size:12.5px;
      line-height:1.35;

    .lux-spec b{color:#fff}
    .lux-tags{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0 0}
    .lux-tag{

      padding:6px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.22);
      color:rgba(255,255,255,.92);
      white-space:nowrap;

    .lux-price{
      margin:10px 0 10px;
      font-weight:950;
      background:linear-gradient(90deg,var(--gold1),var(--gold2));
      -webkit-background-clip:text;
      color:transparent;
      font-size:16px;
    }
    .lux-row{display:flex;gap:10px;flex-wrap:wrap}
    .lux-mini{
      padding:11px 12px;border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      font-weight:900;font-size:13px;
      min-height:44px;
      display:inline-flex;align-items:center;justify-content:center;

    .lux-mini.gold{
      border:0;background:linear-gradient(90deg,var(--gold1),var(--gold2));
      color:#0a0a0f;
    }

    .lux-info{
      border:1px solid var(--line);

    .lux-small{margin:0;color:var(--muted);font-size:13px;line-height:1.45}

      .lux-wa-float span{display:none}
      .lux-wa-float{padding:12px 13px}

</head>

          {name:"Cloud", type:"EDP", ml:"100 ml", use:"Diario", notes:"Dulce, crema, almizcle", vibe:["🍬 Dulce","☁️ Suave","☀️ Diario"], price:1900},

    function cardHTML(p){
      const msg = Hola quiero ${p.name} ${p.type} ${p.ml} en ${mxn(p.price)}. ¿Hay disponibilidad?;
      const tags = (p.vibe || []).map(t=><span class="lux-tag">${t}</span>).join("");
      return `
        <div class="lux-card">
          <div class="lux-img"></div>
          <div class="lux-content">
            <p class="lux-name">${p.name}</p>
            <p class="lux-meta">${p.ml} • ${p.type} • ${p.use}</p>

            <div class="lux-spec">
              <b>Especificaciones:</b><br>
              <b>Notas/Estilo:</b> ${p.notes}<br>
              <b>Uso:</b> ${p.use}
            </div>

            ${tags ? <div class="lux-tags">${tags}</div> : ``}

            <div class="lux-price">${mxn(p.price)}</div>

            <div class="lux-row">
              <a class="lux-mini gold" target="_blank" rel="noopener" href="${wa(msg)}">Pedir</a>
            </div>
          </div>
        </div>
      `;
    }

    function sectionHTML(sec, q=""){
      const query = q.trim().toLowerCase();
      let items = sec.items;

      if(query){
        items = items.filter(p=>{
          const blob = ${sec.title} ${p.name} ${p.type} ${p.ml} ${p.use} ${p.notes} ${(p.vibe||[]).join(" ")}.toLowerCase();
          return blob.includes(query);
        });
      }

      const count = items.length;
      if(count === 0) return "";

      return `
        <section id="${sec.id}">
          <h2 class="lux-h2">
            <span>${sec.title}</span>
            <span class="lux-pill">${count} productos</span>
          </h2>

          <div class="lux-grid">
            ${items.map(cardHTML).join("")}
          </div>

          ${sec.note ? <p class="lux-note">${sec.note}</p> : ``}
        </section>
      `;
    }

    const catalog = document.getElementById("catalog");
    const q = document.getElementById("q");
    const count = document.getElementById("count");

    function render(){
      const query = q.value || "";
      const html = sections.map(s=>sectionHTML(s, query)).join("");
      catalog.innerHTML = html + `
        <section id="como-comprar" style="margin-top:16px">
          <h2 class="lux-h2">🛒 Cómo comprar</h2>
          <div class="lux-info">
            <p class="lux-small">
              <b>1)</b> Elige tu perfume → <b>2)</b> “Pedir” → <b>3)</b> Te confirmo disponibilidad, pago y entrega por WhatsApp.<br>
              <b>WhatsApp:</b> +1 (956) 337-1082
            </p>
          </div>
        </section>
      `;

      // contador total mostrado (filtrado)
      const total = sections.reduce((acc, sec)=>{
        const query2 = query.trim().toLowerCase();
        if(!query2) return acc + sec.items.length;
        const c = sec.items.filter(p=>{
          const blob = ${sec.title} ${p.name} ${p.type} ${p.ml} ${p.use} ${p.notes} ${(p.vibe||[]).join(" ")}.toLowerCase();
          return blob.includes(query2);
        }).length;
        return acc + c;
      }, 0);

      count.textContent = ${total} perfumes;
    }

    q.addEventListener("input", render);
    render();
  </script>
</body>
</html>
