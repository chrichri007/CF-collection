<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfume Essential</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:40px;
font-size:34px;
font-weight:bold;
}

.section{
padding:20px;
}

.section-title{
font-size:24px;
margin-bottom:20px;
border-bottom:2px solid #333;
padding-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#111;
border-radius:12px;
border:1px solid #333;
padding:20px;
}

.name{
font-size:18px;
font-weight:bold;
}

.specs{
color:#aaa;
font-size:14px;
margin-top:6px;
}

.price{
color:#ffd700;
font-weight:bold;
font-size:20px;
margin:12px 0;
}

button{
background:#ffd700;
border:none;
padding:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
width:100%;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50px;
text-decoration:none;
font-weight:bold;
}

</style>

</head>

<body>

<header>Perfume Essential</header>

<div id="catalog"></div>

<a class="whatsapp"
href="https://wa.me/19563371082"
target="_blank">
WhatsApp
</a>

<script>

const sections=[

{
title:"⭐ Más Vendidos",
perfumes:[

{name:"Invictus",brand:"Paco Rabanne",type:"EDT",ml:"100ml",price:1699},
{name:"Versace Eros",brand:"Versace",type:"EDP",ml:"100ml",price:1499},
{name:"Nautica Voyage",brand:"Nautica",type:"EDT",ml:"100ml",price:339},
{name:"Montblanc Explorer",brand:"Montblanc",type:"EDP",ml:"100ml",price:999}

]
},

{
title:"🧴 Perfumes Árabes",
perfumes:[

{name:"Lattafa Asad",brand:"Lattafa",type:"EDP",ml:"100ml",price:599},
{name:"Afnan 9PM",brand:"Afnan",type:"EDP",ml:"100ml",price:699},
{name:"Hawas for Him",brand:"Rasasi",type:"EDP",ml:"100ml",price:899},
{name:"Bharara King",brand:"Bharara",type:"EDP",ml:"100ml",price:1399}

]
},

{
title:"👑 Diseñador",
perfumes:[

{name:"Acqua Di Gio",brand:"Armani",type:"EDT",ml:"100ml",price:1899},
{name:"Jean Paul Gaultier Le Male",brand:"Jean Paul Gaultier",type:"EDT",ml:"125ml",price:1899},
{name:"Boss Bottled",brand:"Hugo Boss",type:"EDT",ml:"100ml",price:999},
{name:"Dolce & Gabbana K",brand:"Dolce & Gabbana",type:"EDP",ml:"100ml",price:1499}

]
}

]

const catalog=document.getElementById("catalog")

sections.forEach(section=>{

catalog.innerHTML+=`

<div class="section">

<div class="section-title">${section.title}</div>

<div class="grid">

${section.perfumes.map(p=>`

<div class="card">

<div class="name">${p.name}</div>

<div class="specs">

Marca: ${p.brand}<br>
Tipo: ${p.type}<br>
Tamaño: ${p.ml}

</div>

<div class="price">$${p.price} MXN</div>

<button onclick="window.open('https://wa.me/19563371082?text=Hola quiero ${p.name}')">

Comprar

</button>

</div>

`).join("")}

</div>

</div>

`

})

</script>

</body>
</html>
