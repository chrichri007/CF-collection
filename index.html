<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perfume Essential</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:30px;
font-size:32px;
font-weight:bold;
}

.search{
text-align:center;
margin-bottom:20px;
}

.search input{
padding:10px;
width:250px;
border-radius:8px;
border:none;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
border-radius:12px;
border:1px solid #333;
padding:15px;
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
}

.price{
color:#ffd700;
font-size:18px;
margin:10px 0;
font-weight:bold;
}

button{
background:#ffd700;
border:none;
padding:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header>Perfume Essential</header>

<div class="search">
<input type="text" id="search" placeholder="Buscar perfume...">
</div>

<div class="grid" id="catalog"></div>

<script>

const phone="19563371082"

function precio(base){

if(base<500) return Math.round(base*1.40)
if(base<1000) return Math.round(base*1.30)
if(base<2000) return Math.round(base*1.20)

return Math.round(base*1.15)

}

const perfumes=[

{
name:"Nautica Voyage",
brand:"Nautica",
base:242,
img:"https://m.media-amazon.com/images/I/71m4iJqJY6L._AC_UF1000,1000_QL80_.jpg"
},

{
name:"Versace Eros",
brand:"Versace",
base:1054,
img:"https://m.media-amazon.com/images/I/61K8ouYrHeL.jpg"
},

{
name:"Versace Dylan Blue",
brand:"Versace",
base:887,
img:"https://m.media-amazon.com/images/I/61mH0U9sFCL.jpg"
},

{
name:"Invictus",
brand:"Paco Rabanne",
base:1388,
img:"https://m.media-amazon.com/images/I/71dZqv1A0GL.jpg"
},

{
name:"Acqua Di Gio",
brand:"Armani",
base:1590,
img:"https://m.media-amazon.com/images/I/61g8QvQ8SQL.jpg"
},

{
name:"Montblanc Explorer",
brand:"Montblanc",
base:790,
img:"https://m.media-amazon.com/images/I/61dJ5pHfWnL.jpg"
},

{
name:"Afnan 9PM",
brand:"Afnan",
base:525,
img:"https://m.media-amazon.com/images/I/61v+4Wc9fAL.jpg"
},

{
name:"Lattafa Asad",
brand:"Lattafa",
base:479,
img:"https://m.media-amazon.com/images/I/61QF9W6N6HL.jpg"
},

{
name:"Bharara King",
brand:"Bharara",
base:1060,
img:"https://m.media-amazon.com/images/I/61Z2pVwJbJL.jpg"
},

{
name:"Jean Paul Gaultier Le Male",
brand:"Jean Paul Gaultier",
base:1500,
img:"https://m.media-amazon.com/images/I/71xV8Kf8WGL.jpg"
},

{
name:"Boss Bottled",
brand:"Hugo Boss",
base:767,
img:"https://m.media-amazon.com/images/I/61Hj2tY+PrL.jpg"
},

{
name:"Hawas for Him",
brand:"Rasasi",
base:631,
img:"https://m.media-amazon.com/images/I/61Rk+Uu9cBL.jpg"
},

{
name:"Dolce Gabbana King",
brand:"Dolce Gabbana",
base:1017,
img:"https://m.media-amazon.com/images/I/71tqkXq6XHL.jpg"
},

{
name:"Davidoff Cool Water",
brand:"Davidoff",
base:700,
img:"https://m.media-amazon.com/images/I/71Pz1kP7KpL.jpg"
}

]

while(perfumes.length<200){
perfumes.push(perfumes[Math.floor(Math.random()*perfumes.length)])
}

function mostrar(lista){

const catalog=document.getElementById("catalog")
catalog.innerHTML=""

lista.forEach(p=>{

const sell=precio(p.base)

catalog.innerHTML+=`

<div class="card">

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">$${sell} MXN</div>

<button onclick="window.open('https://wa.me/${phone}?text=Hola quiero ${p.name}')">

Comprar

</button>

</div>

`

})

}

mostrar(perfumes)

document.getElementById("search").addEventListener("input",e=>{

const text=e.target.value.toLowerCase()

const filtered=perfumes.filter(p=>
p.name.toLowerCase().includes(text) ||
p.brand.toLowerCase().includes(text)
)

mostrar(filtered)

})

</script>

</body>
</html>
