<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#07070c" />
  <title>Perfume Essential | Catálogo</title>

  <style>
    :root{
      --bg:#07070c;
      --text:#f2f4ff;
      --muted:#a9acc0;
      --line:rgba(255,255,255,.10);
      --line2:rgba(255,255,255,.18);
      --gold1:#ffd37a;
      --gold2:#b8872b;
      --shadow: 0 18px 70px rgba(0,0,0,.65);
      --r:18px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--text);
      background:
        radial-gradient(1000px 420px at 12% 0%, rgba(255,211,122,.18), transparent 60%),
        radial-gradient(900px 380px at 88% 10%, rgba(77,225,255,.10), transparent 60%),
        linear-gradient(180deg, #05050a, var(--bg));
      min-height:100vh;
    }
    a{color:inherit;text-decoration:none}

    .lux-wrap{max-width:1120px;margin:0 auto;padding:18px}
    .lux-bg{
      border-radius:22px;
      border:1px solid var(--line);
      box-shadow: var(--shadow);
      overflow:hidden;
      background: rgba(0,0,0,.18);
      backdrop-filter: blur(10px);
    }

    .lux-hero{padding:22px 18px 14px;border-bottom:1px solid var(--line)}
    .lux-top{display:flex;gap:14px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .lux-brand{display:flex;gap:10px;align-items:center}
    .lux-dot{
      width:12px;height:12px;border-radius:999px;
      background:linear-gradient(90deg,var(--gold1),var(--gold2));
      box-shadow:0 0 26px rgba(255,211,122,.35);
      flex:0 0 auto;
    }
    .lux-title{margin:0;font-size:clamp(24px, 3vw, 34px);letter-spacing:.3px}
    .lux-sub{margin:6px 0 0;color:var(--muted);font-size:14px}

    .lux-actions{display:flex;gap:10px;flex-wrap:wrap}
    .lux-btn{
      display:inline-flex;align-items:center;justify-content:center;
      padding:12px 14px;border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      color:var(--text);font-weight:900;
      transition:.2s transform ease, .2s filter ease, .2s border-color ease;
      min-height:44px;
    }
    .lux-btn:hover{transform:translateY(-1px);filter:brightness(1.06);border-color:var(--line2)}
    .lux-btn.gold{
      border:0;color:#0a0a0f;
      background:linear-gradient(90deg,var(--gold1),var(--gold2));
      box-shadow:0 14px 40px rgba(255,211,122,.18);
    }

    .lux-badges{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .lux-badge{
      font-size:12px;padding:7px 10px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--muted);
      white-space:nowrap;
    }

    .lux-nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .lux-chip{
      font-size:13px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.25);
      color:var(--text);
      transition:.2s border-color ease,.2s transform ease;
    }
    .lux-chip:hover{border-color:var(--line2);transform:translateY(-1px)}

    .lux-body{padding:18px}
    .lux-h2{margin:18px 0 12px;font-size:18px;letter-spacing:.2px}
    .lux-note{margin:10px 0 0;color:var(--muted);font-size:13px}

    .lux-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    @media (max-width: 980px){ .lux-grid{grid-template-columns:repeat(2,1fr)} }
    @media (max-width: 680px){ .lux-grid{grid-template-columns:1fr} }

    .lux-card{
      border:1px solid var(--line);
      border-radius:var(--r);
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      overflow:hidden;
      box-shadow: 0 14px 50px rgba(0,0,0,.35);
    }

    /* “Imagen” placeholder (sin fotos) */
    .lux-img{
      height:58px;
      border-bottom:1px solid var(--line);
      background:
        radial-gradient(520px 180px at 20% 10%, rgba(255,211,122,.22), transparent 55%),
        radial-gradient(520px 180px at 80% 20%, rgba(77,225,255,.10), transparent 60%),
        linear-gradient(135deg, rgba(255,255,255,.02), rgba(255,255,255,.00));
    }

    .lux-content{padding:12px 12px 14px}
    .lux-name{margin:0 0 6px;font-weight:950;letter-spacing:.2px}
    .lux-meta{margin:0;color:var(--muted);font-size:13px;line-height:1.35}
    .lux-tags{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}
    .lux-tag{
      font-size:12px;
      padding:6px 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.22);
      color:rgba(255,255,255,.92);
      white-space:nowrap;
    }
    .lux-price{
      margin:10px 0 10px;
      font-weight:950;
      background:linear-gradient(90deg,var(--gold1),var(--gold2));
      -webkit-background-clip:text;
      color:transparent;
    }
    .lux-row{display:flex;gap:10px;flex-wrap:wrap}
    .lux-mini{
      padding:11px 12px;border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      font-weight:900;font-size:13px;
      min-height:44px;
      display:inline-flex;align-items:center;justify-content:center;
      flex:1 1 auto;
    }
    .lux-mini.gold{
      border:0;background:linear-gradient(90deg,var(--gold1),var(--gold2));
      color:#0a0a0f;
    }

    .lux-info{
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.03);
      padding:14px;
    }
    .lux-small{margin:0;color:var(--muted);font-size:13px;line-height:1.45}

    .lux-wa-float{
      position:fixed;
      right:16px;
      bottom:16px;
      z-index:9999;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:linear-gradient(90deg,var(--gold1),var(--gold2));
      color:#0a0a0f;
      font-weight:950;
      box-shadow: 0 18px 60px rgba(0,0,0,.55);
      min-height:44px;
    }
    .lux-wa-float span{display:inline}
    @media (max-width: 420px){
      .lux-wa-float span{display:none}
      .lux-wa-float{padding:12px 13px}
    }
  </style>
</head>
