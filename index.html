<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfume Essential</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;

/* Fondo mármol */
background:
radial-gradient(circle at 20% 20%, rgba(255,255,255,0.05), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,255,255,0.04), transparent 40%),
linear-gradient(135deg,#0c0c0c,#1a1a1a,#111);
background-size:cover;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* HEADER */

header{
text-align:center;
padding:40px 20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
font-size:40px;
letter-spacing:2px;
background:linear-gradient(90deg,#ffd37a,#b8872b);
-webkit-background-clip:text;
color:transparent;
}

header p{
color:#bbb;
}

/* GRID PERFUMES */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:rgba(0,0,0,0.5);
border:1px solid rgba(255,255,255,0.1);
border-radius:15px;
padding:20px;
backdrop-filter:blur(10px);
}

.card h3{
margin-top:0;
}

.price{
font-weight:bold;
margin:10px 0;
}

/* BOTONES */

.btn{
display:inline-block;
padding:10px 15px;
border-radius:10px;
background:linear-gradient(90deg,#ffd37a,#b8872b);
color:black;
font-weight:bold;
text-decoration:none;
}

/* BOTON WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:linear-gradient(90deg,#ffd37a,#b8872b);
padding:15px;
border-radius:50px;
font-weight:bold;
color:black;
text-decoration:none;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

</style>
</head>

<body>

<header>
<h1>Perfume Essential</h1>
<p>Boutique • Catálogo premium</p>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h3>Dior Sauvage EDP</h3>
<p>100ml • Versátil</p>
<div class="price">$3,200 MXN</div>
<a class="btn" target="_blank"
href="https://wa.me/19563371082?text=Hola%20quiero%20Dior%20Sauvage">
Pedir
</a>
</div>

<div class="card">
<h3>Acqua Di Gio Parfum</h3>
<p>125ml • Elegante</p>
<div class="price">$2,900 MXN</div>
<a class="btn" target="_blank"
href="https://wa.me/19563371082?text=Hola%20quiero%20Acqua%20Di%20Gio">
Pedir
</a>
</div>

<div class="card">
<h3>Azzaro The Most Wanted</h3>
<p>100ml • Noche</p>
<div class="price">$2,600 MXN</div>
<a class="btn" target="_blank"
href="https://wa.me/19563371082?text=Hola%20quiero%20Azzaro%20Most%20Wanted">
Pedir
</a>
</div>

</div>

</div>

<a class="whatsapp"
href="https://wa.me/19563371082"
target="_blank">
WhatsApp
</a>

</body>
</html>
